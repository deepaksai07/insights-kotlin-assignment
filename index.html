<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insights Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        lavender: '#BDB2FF',
                        teal: '#70A1A1',
                        pink: '#FF8C8C',
                        background: '#F5F7FA',
                        textPrimary: '#1A1A1A',
                        textSecondary: '#6B7280',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-background text-textPrimary">
    <div class="max-w-md mx-auto min-h-screen pb-24 relative shadow-2xl bg-[#F5F7FA]">
        <!-- Top Bar -->
        <header class="flex justify-between items-center p-6">
            <div class="w-6 h-6"></div>
            <h1 class="text-xl font-bold">Insights</h1>
            <button class="p-1">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>
            </button>
        </header>

        <!-- Stability Summary -->
        <div class="px-6 mb-6">
            <div class="bg-white rounded-[32px] p-6 shadow-sm">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-lg font-bold">Stability Summary</h2>
                    <div class="bg-teal/10 text-teal px-3 py-1 rounded-full text-[10px] font-semibold flex items-center">
                        <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 10l7-7m0 0l7 7m-7-7v18" /></svg>
                        Stability Improving
                    </div>
                </div>
                <div class="text-5xl font-bold mb-4">78%</div>
                <div class="h-24 w-full">
                    <svg class="w-full h-full" viewBox="0 0 100 40" preserveAspectRatio="none">
                        <path d="M0 40 Q 15 15, 30 25 T 60 10 T 100 20 V 40 H 0 Z" fill="url(#grad)" />
                        <path d="M0 40 Q 15 15, 30 25 T 60 10 T 100 20" fill="none" stroke="#BDB2FF" stroke-width="1.5" />
                        <defs>
                            <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" style="stop-color: #BDB2FF; stop-opacity: 0.6" />
                                <stop offset="100%" style="stop-color: #BDB2FF; stop-opacity: 0.05" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="flex justify-between text-[10px] text-textSecondary mt-2 px-1">
                    <span>Jan</span><span>Feb</span><span>Mar</span><span>Apr</span>
                </div>
            </div>
        </div>

        <!-- Cycle Trends -->
        <div class="px-6 mb-6">
            <div class="bg-white rounded-[32px] p-6 shadow-sm">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-bold">Cycle Trends</h2>
                    <div class="flex items-center text-[10px] font-medium text-textSecondary bg-gray-50 px-2 py-1 rounded-full">
                        <button class="p-1 hover:text-lavender">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
                        </button>
                        <span class="px-1">Jan - Jun</span>
                        <button class="p-1 hover:text-lavender">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
                        </button>
                    </div>
                </div>
                <div class="flex justify-between items-end h-32 gap-3">
                    <div class="flex-1 flex flex-col items-center">
                        <div class="w-6 h-20 bg-lavender/10 rounded-full flex flex-col justify-end p-1 gap-1">
                            <div class="h-2 bg-teal rounded-full"></div>
                            <div class="h-6 bg-pink rounded-full"></div>
                        </div>
                        <span class="text-[9px] text-textSecondary mt-2">Jan</span>
                    </div>
                    <div class="flex-1 flex flex-col items-center">
                        <div class="w-6 h-24 bg-lavender/10 rounded-full flex flex-col justify-end p-1 gap-1">
                            <div class="h-3 bg-teal rounded-full"></div>
                            <div class="h-8 bg-pink rounded-full"></div>
                        </div>
                        <span class="text-[9px] text-textSecondary mt-2">Feb</span>
                    </div>
                    <div class="flex-1 flex flex-col items-center">
                        <div class="w-6 h-28 bg-lavender/10 rounded-full flex flex-col justify-end p-1 gap-1">
                            <div class="h-4 bg-teal rounded-full"></div>
                            <div class="h-10 bg-pink rounded-full"></div>
                        </div>
                        <span class="text-[9px] text-textSecondary mt-2">Mar</span>
                    </div>
                    <div class="flex-1 flex flex-col items-center">
                        <div class="w-6 h-32 bg-lavender/10 rounded-full flex flex-col justify-end p-1 gap-1">
                            <div class="h-6 bg-teal rounded-full flex items-center justify-center"><div class="w-1.5 h-1.5 bg-white/40 rounded-full"></div></div>
                            <div class="h-14 bg-pink rounded-full flex items-center justify-center"><div class="w-1.5 h-1.5 bg-white/40 rounded-full"></div></div>
                        </div>
                        <span class="text-[9px] font-bold text-textPrimary mt-2">Apr</span>
                    </div>
                    <div class="flex-1 flex flex-col items-center">
                        <div class="w-6 h-24 bg-lavender/10 rounded-full flex flex-col justify-end p-1 gap-1">
                            <div class="h-3 bg-teal rounded-full"></div>
                            <div class="h-8 bg-pink rounded-full"></div>
                        </div>
                        <span class="text-[9px] text-textSecondary mt-2">May</span>
                    </div>
                    <div class="flex-1 flex flex-col items-center">
                        <div class="w-6 h-26 bg-lavender/10 rounded-full flex flex-col justify-end p-1 gap-1">
                            <div class="h-4 bg-teal rounded-full"></div>
                            <div class="h-9 bg-pink rounded-full"></div>
                        </div>
                        <span class="text-[9px] text-textSecondary mt-2">Jun</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Body Signals -->
        <div class="px-6 mb-6">
            <div class="bg-white rounded-[32px] p-6 shadow-sm">
                <h2 class="text-lg font-bold mb-6">Body Signals & Symptom Trends</h2>
                <div class="flex items-center justify-between">
                    <div class="relative w-28 h-28">
                        <svg viewBox="0 0 36 36" class="w-full h-full transform -rotate-90">
                            <circle cx="18" cy="18" r="15.915" fill="transparent" stroke="#BDB2FF" stroke-width="4" stroke-dasharray="40 60" stroke-linecap="round" />
                            <circle cx="18" cy="18" r="15.915" fill="transparent" stroke="#FF8C8C" stroke-width="4" stroke-dasharray="35 65" stroke-dashoffset="-40" stroke-linecap="round" />
                            <circle cx="18" cy="18" r="15.915" fill="transparent" stroke="#70A1A1" stroke-width="4" stroke-dasharray="25 75" stroke-dashoffset="-75" stroke-linecap="round" />
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center flex-col">
                            <span class="text-xs font-bold text-lavender">64%</span>
                        </div>
                    </div>
                    <div class="flex flex-col gap-3">
                        <div class="flex items-center gap-2">
                            <div class="w-2 h-2 rounded-full bg-pink"></div>
                            <span class="text-[10px] font-medium text-textSecondary">Abdominal Pain</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="w-2 h-2 rounded-full bg-teal"></div>
                            <span class="text-[10px] font-medium text-textSecondary">Mood Swing</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="w-2 h-2 rounded-full bg-lavender"></div>
                            <span class="text-[10px] font-medium text-textSecondary">Bloating</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Lifestyle Impact (Heatmap) -->
        <div class="px-6 mb-6">
            <div class="bg-white rounded-[32px] p-6 shadow-sm">
                <h2 class="text-lg font-bold mb-4">Lifestyle Impact & Correlation</h2>
                <div class="grid grid-cols-12 gap-1 mb-4">
                    <!-- Rows of heatmap -->
                    <div class="w-full h-4 bg-lavender/10 rounded-sm"></div><div class="w-full h-4 bg-lavender/20 rounded-sm"></div><div class="w-full h-4 bg-lavender/40 rounded-sm"></div><div class="w-full h-4 bg-lavender/10 rounded-sm"></div><div class="w-full h-4 bg-lavender/60 rounded-sm"></div><div class="w-full h-4 bg-lavender/20 rounded-sm"></div><div class="w-full h-4 bg-lavender/10 rounded-sm"></div><div class="w-full h-4 bg-lavender/80 rounded-sm"></div><div class="w-full h-4 bg-lavender/20 rounded-sm"></div><div class="w-full h-4 bg-lavender/10 rounded-sm"></div><div class="w-full h-4 bg-lavender/40 rounded-sm"></div><div class="w-full h-4 bg-lavender/10 rounded-sm"></div>
                    <div class="w-full h-4 bg-lavender/40 rounded-sm"></div><div class="w-full h-4 bg-lavender/10 rounded-sm"></div><div class="w-full h-4 bg-lavender/80 rounded-sm"></div><div class="w-full h-4 bg-lavender/20 rounded-sm"></div><div class="w-full h-4 bg-lavender/10 rounded-sm"></div><div class="w-full h-4 bg-lavender/40 rounded-sm"></div><div class="w-full h-4 bg-lavender/60 rounded-sm"></div><div class="w-full h-4 bg-lavender/10 rounded-sm"></div><div class="w-full h-4 bg-lavender/20 rounded-sm"></div><div class="w-full h-4 bg-lavender/40 rounded-sm"></div><div class="w-full h-4 bg-lavender/10 rounded-sm"></div><div class="w-full h-4 bg-lavender/100 rounded-sm"></div>
                    <div class="w-full h-4 bg-lavender/10 rounded-sm"></div><div class="w-full h-4 bg-lavender/60 rounded-sm"></div><div class="w-full h-4 bg-lavender/20 rounded-sm"></div><div class="w-full h-4 bg-lavender/10 rounded-sm"></div><div class="w-full h-4 bg-lavender/80 rounded-sm"></div><div class="w-full h-4 bg-lavender/20 rounded-sm"></div><div class="w-full h-4 bg-lavender/10 rounded-sm"></div><div class="w-full h-4 bg-lavender/40 rounded-sm"></div><div class="w-full h-4 bg-lavender/10 rounded-sm"></div><div class="w-full h-4 bg-lavender/20 rounded-sm"></div><div class="w-full h-4 bg-lavender/60 rounded-sm"></div><div class="w-full h-4 bg-lavender/10 rounded-sm"></div>
                </div>
                <div class="flex justify-between text-[8px] font-medium text-textSecondary">
                    <span>Low Correlation</span>
                    <span>High Correlation</span>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/90 backdrop-blur-md border-t border-gray-100 flex justify-around items-center py-4 px-2">
            <button class="flex flex-col items-center gap-1 text-textSecondary opacity-40">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            </button>
            <button class="flex flex-col items-center gap-1 text-lavender">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M3 13.125C3 12.5037 3.50368 12 4.125 12H6.1875C6.80882 12 7.3125 12.5037 7.3125 13.125V20.125C7.3125 20.7463 6.80882 21.25 6.1875 21.25H4.125C3.50368 21.25 3 20.7463 3 20.125V13.125ZM10.3125 7.125C10.3125 6.50368 10.8162 6 11.4375 6H13.5C14.1213 6 14.625 6.50368 14.625 7.125V20.125C14.625 20.7463 14.1213 21.25 13.5 21.25H11.4375C10.8162 21.25 10.3125 20.7463 10.3125 20.125V7.125ZM17.625 3.125C17.625 2.50368 18.1287 2 18.75 2H20.8125C21.4338 2 21.9375 2.50368 21.9375 3.125V20.125C21.9375 20.7463 21.4338 21.25 20.8125 21.25H18.75C18.1287 21.25 17.625 20.7463 17.625 20.125V3.125Z"/></svg>
                <div class="w-1 h-1 bg-lavender rounded-full"></div>
            </button>
            <div class="relative">
                <button class="bg-lavender w-14 h-14 rounded-full flex items-center justify-center text-white -mt-10 shadow-lg border-4 border-white">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>
                </button>
            </div>
            <button class="flex flex-col items-center gap-1 text-textSecondary opacity-40">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            </button>
            <button class="flex flex-col items-center gap-1 text-textSecondary opacity-40">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            </button>
        </nav>
    </div>
</body>
</html>
